<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Know Weather</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="weather-app">
      <section class="search-panel" aria-label="Weather search">
        <div>
          <p class="eyebrow">City forecast</p>
          <h1>Know Weather</h1>
        </div>

        <div class="controls">
          <select id="city-select" aria-label="Choose a city">
            <option value=""></option>
            <option value="new york">New York</option>
            <option value="los angeles">Los Angeles</option>
            <option value="chicago">Chicago</option>
            <option value="paris">Paris</option>
            <option value="tokyo">Tokyo</option>
            <option value="london">London</option>
            <option value="mumbai">Mumbai</option>
            <option value="delhi">Delhi</option>
            <option value="bangalore">Bangalore</option>
            <option value="chennai">Chennai</option>
            <option value="hyderabad">Hyderabad</option>
            <option value="kolkata">Kolkata</option>
            <option value="pune">Pune</option>
          </select>
          <button id="get-weather-btn" type="button">Get Weather</button>
        </div>
      </section>

      <section id="weather-card" class="weather-card" aria-live="polite">
        <div class="primary-weather">
          <img id="weather-icon" src="" alt="" />
          <div>
            <p id="location" class="location">Select a city</p>
            <p id="weather-main" class="weather-main">N/A</p>
          </div>
        </div>

        <div class="temperature-row">
          <div>
            <span class="label">Temperature</span>
            <strong id="main-temperature">N/A</strong>
          </div>
          <div>
            <span class="label">Feels like</span>
            <strong id="feels-like">N/A</strong>
          </div>
        </div>

        <div class="details-grid">
          <div>
            <span class="label">Humidity</span>
            <strong id="humidity">N/A</strong>
          </div>
          <div>
            <span class="label">Wind</span>
            <strong id="wind">N/A</strong>
          </div>
          <div>
            <span class="label">Wind gust</span>
            <strong id="wind-gust">N/A</strong>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
