<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Know Weather</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-weather="default" data-period="day">
    <script>
      (() => {
        const hour = new Date().getHours();
        document.body.dataset.period = hour >= 6 && hour < 18 ? "day" : "night";
      })();
    </script>
    <canvas id="weather-canvas"></canvas>
    <main class="weather-app" aria-live="polite">
      <section class="search-panel" aria-label="Weather search">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Know Weather</p>
            <h1>City forecast</h1>
          </div>
        </div>
        <div class="search-actions">
          <div class="controls">
            <input
              id="city-input"
              type="text"
              placeholder="Search city"
              aria-label="Search city"
            />
            <button id="get-weather-btn" type="button">Search</button>
          </div>
          <p id="status-message" class="status-message"></p>
        </div>
      </section>

      <section class="hero-weather">
        <p id="location" class="location">Select a city</p>
        <p id="main-temperature" class="hero-temperature">--&deg;</p>
        <p id="weather-main" class="weather-main">N/A</p>
        <p id="high-low" class="high-low">H:--&deg; L:--&deg;</p>
      </section>

      <section class="forecast-panel hourly-panel" aria-label="Hourly forecast">
        <p id="forecast-insight" class="forecast-insight">
          Search a city to see what the sky is doing next.
        </p>
        <div id="hourly-forecast" class="hourly-forecast"></div>
      </section>

      <section class="forecast-panel daily-panel" aria-label="10-day forecast">
        <div class="panel-title">
          <span aria-hidden="true">10</span>
          <h2>10-Day Forecast</h2>
        </div>
        <div id="daily-forecast" class="daily-forecast"></div>
      </section>

      <section class="metric-grid" aria-label="Weather details">
        <div>
          <span class="label">Feels like</span>
          <strong id="feels-like">N/A</strong>
        </div>
        <div>
          <span class="label">Humidity</span>
          <strong id="humidity">N/A</strong>
        </div>
        <div>
          <span class="label">Wind</span>
          <strong id="wind">N/A</strong>
        </div>
        <div>
          <span class="label">Wind gust</span>
          <strong id="wind-gust">N/A</strong>
        </div>
      </section>
    </main>
    <script src="weather-effects.js"></script>
    <script src="script.js"></script>
  </body>
</html>
